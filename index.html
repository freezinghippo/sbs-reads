<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0d0d15">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SB's Reads">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>SB's Reads</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0d0d15; --surface:#161622; --surface2:#1c1c2e; --border:#2a2a3d;
  --accent:#7c6cff; --accent2:#ff6c9d; --accent3:#6cffb8;
  --text:#f0f0ff; --text2:#b0b0cc; --text3:#7a7a99;
  --safe-top:env(safe-area-inset-top,0px); --safe-bottom:env(safe-area-inset-bottom,0px);
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { font-family:'Inter',sans-serif; background:var(--bg); color:var(--text); height:100dvh; display:flex; flex-direction:column; overflow:hidden; padding-top:var(--safe-top); }

.header { padding:14px 18px 12px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid var(--border); flex-shrink:0; }
.logo { font-size:21px; font-weight:900; letter-spacing:-0.5px; }
.logo-sb { color:var(--text); }
.logo-x { color:var(--accent3); }
.count { font-size:11px; color:var(--text3); background:var(--surface); padding:4px 11px; border-radius:20px; border:1px solid var(--border); font-weight:600; }

.add-wrap { padding:14px 18px 10px; flex-shrink:0; }
.add-row { display:flex; gap:8px; }
.add-input { flex:1; background:var(--surface); border:1.5px solid var(--border); border-radius:12px; padding:12px 14px; color:var(--text); font-family:'Inter',sans-serif; font-size:14px; font-weight:500; outline:none; transition:border-color 0.15s; min-width:0; }
.add-input::placeholder { color:var(--text3); }
.add-input:focus { border-color:var(--accent); }
.btn-paste { width:46px; flex-shrink:0; border-radius:12px; border:1.5px solid var(--accent2); background:transparent; color:var(--accent2); font-size:17px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.15s; }
.btn-paste:active { background:rgba(255,108,157,0.12); }
.btn-add { flex-shrink:0; padding:0 18px; border-radius:12px; border:none; background:linear-gradient(135deg,var(--accent),var(--accent2)); color:white; font-family:'Inter',sans-serif; font-weight:800; font-size:14px; cursor:pointer; transition:all 0.15s; }
.btn-add:active { transform:scale(0.96); }
.hint { font-size:11px; color:var(--text3); margin-top:8px; font-weight:500; line-height:1.5; }

.search-wrap { padding:0 18px 8px; flex-shrink:0; position:relative; }
.search-icon { position:absolute; left:30px; top:50%; transform:translateY(-50%); color:var(--text3); font-size:13px; pointer-events:none; }
.search-input { width:100%; background:var(--surface); border:1.5px solid var(--border); border-radius:11px; padding:8px 14px 8px 32px; color:var(--text); font-family:'Inter',sans-serif; font-size:13px; font-weight:500; outline:none; transition:border-color 0.15s; }
.search-input::placeholder { color:var(--text3); }
.search-input:focus { border-color:var(--accent); }

/* CATEGORY FILTER PILLS */
.cat-filters { display:flex; gap:7px; overflow-x:auto; scrollbar-width:none; padding:0 18px 8px; flex-shrink:0; }
.cat-filters::-webkit-scrollbar { display:none; }
.cat-pill { flex-shrink:0; padding:5px 12px; border-radius:20px; font-size:11px; border:1.5px solid var(--border); background:var(--surface); color:var(--text2); cursor:pointer; font-weight:700; white-space:nowrap; transition:all 0.15s; }
.cat-pill.all-active { background:var(--accent); border-color:var(--accent); color:#fff; }
.cat-pill.active { color:#0d0d15; border-color:transparent; }
.cat-tag { font-size:9px; font-weight:800; padding:1px 7px; border-radius:4px; letter-spacing:0.3px; line-height:1.7; flex-shrink:0; }
.cat-tag.pending { background:var(--surface2); color:var(--text3); border:1px solid var(--border); }

.list-wrap { flex:1; overflow-y:auto; overflow-x:hidden; padding-bottom:30px; scrollbar-width:none; min-height:0; }
.list-wrap::-webkit-scrollbar { display:none; }

.link-item { display:flex; align-items:center; padding:13px 18px; border-bottom:1px solid var(--border); gap:13px; cursor:pointer; background:var(--bg); position:relative; overflow:hidden; }
.link-item:active { background:var(--surface); }
.fav { width:34px; height:34px; border-radius:9px; background:var(--surface2); flex-shrink:0; display:flex; align-items:center; justify-content:center; overflow:hidden; border:1px solid var(--border); }
.fav img { width:20px; height:20px; }
.fav-fallback { font-size:15px; color:var(--text3); }
.link-body { flex:1; min-width:0; }
.link-title { font-size:14px; color:var(--text); font-weight:700; line-height:1.35; word-break:break-word; }
.link-url { font-size:11px; color:var(--text3); font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:2px; }
.link-time { font-size:10px; color:var(--text3); font-weight:600; flex-shrink:0; white-space:nowrap; align-self:flex-start; padding-top:2px; }

.empty { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px; padding:70px 30px; color:var(--text3); }
.empty .icon { font-size:40px; opacity:0.6; }
.empty p { font-size:13px; text-align:center; line-height:1.7; color:var(--text2); }

.toast { position:fixed; bottom:calc(24px + var(--safe-bottom)); left:50%; transform:translateX(-50%) translateY(20px); background:var(--surface2); border:1px solid var(--border); color:var(--text); padding:10px 18px; border-radius:12px; font-size:13px; font-weight:600; opacity:0; transition:all 0.3s; z-index:9999; white-space:nowrap; pointer-events:none; display:flex; align-items:center; gap:12px; }
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); pointer-events:auto; }
.toast-undo { background:var(--accent); color:white; border:none; padding:6px 14px; border-radius:8px; font-weight:800; font-size:12px; cursor:pointer; font-family:'Inter',sans-serif; }

@keyframes slideIn { from{opacity:0;transform:translateX(-8px)} to{opacity:1;transform:translateX(0)} }
.link-item { animation:slideIn 0.18s ease; }

/* tappable open-affordance on rows */
.link-actions { display:flex; align-items:center; gap:4px; flex-shrink:0; }
.row-open { font-size:11px; font-weight:800; color:var(--accent3); border:1px solid rgba(108,255,184,0.3); background:rgba(108,255,184,0.06); padding:5px 10px; border-radius:8px; white-space:nowrap; }

/* READER (full-screen subpage) */
.reader { position:fixed; inset:0; background:var(--bg); z-index:400; display:flex; flex-direction:column; transform:translateX(100%); transition:transform 0.3s cubic-bezier(0.4,0,0.2,1); padding-top:var(--safe-top); }
.reader.open { transform:translateX(0); }
.reader-header { padding:11px 16px; display:flex; align-items:center; gap:12px; border-bottom:1px solid var(--border); flex-shrink:0; }
.reader-back { display:flex; align-items:center; gap:6px; color:var(--accent3); font-weight:800; font-size:15px; cursor:pointer; flex-shrink:0; }
.reader-domain { font-size:12px; color:var(--text3); font-weight:600; flex:1; min-width:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.reader-orig { font-size:11px; font-weight:700; color:var(--accent); border:1px solid rgba(124,108,255,0.3); background:rgba(124,108,255,0.06); padding:5px 10px; border-radius:8px; cursor:pointer; flex-shrink:0; }
.reader-body { flex:1; overflow-y:auto; padding:22px 20px calc(40px + var(--safe-bottom)); scrollbar-width:none; }
.reader-body::-webkit-scrollbar { display:none; }
.reader-toggle { display:flex; gap:8px; padding:10px 16px; border-bottom:1px solid var(--border); flex-shrink:0; }
.rt-btn { flex:1; padding:8px; border-radius:10px; border:1.5px solid var(--border); background:transparent; color:var(--text2); font-family:'Inter',sans-serif; font-weight:700; font-size:13px; cursor:pointer; transition:all 0.15s; }
.rt-btn.active { border-color:var(--accent3); background:rgba(108,255,184,0.08); color:var(--accent3); }
.rt-listen { flex:0 0 auto; padding-left:14px; padding-right:14px; border-color:rgba(124,108,255,0.4); color:var(--accent); }
.rt-listen.playing { border-color:var(--accent); background:rgba(124,108,255,0.12); color:var(--accent); }
.rt-speed { flex:0 0 auto; padding-left:11px; padding-right:11px; min-width:46px; border-color:var(--border); color:var(--text2); }
.summary-meta { font-size:11px; color:var(--text3); font-weight:600; margin-bottom:14px; padding-bottom:12px; border-bottom:1px solid var(--border); }
.reader-title { font-size:23px; font-weight:900; line-height:1.25; color:var(--text); margin-bottom:18px; letter-spacing:-0.3px; }
.reader-content { font-size:16px; line-height:1.75; color:var(--text2); }
.reader-content p { margin-bottom:16px; }
.reader-content h1,.reader-content h2,.reader-content h3 { color:var(--text)!important; font-weight:800!important; line-height:1.3; margin:24px 0 10px; }
.reader-content h1 { font-size:21px; } .reader-content h2 { font-size:18px; } .reader-content h3 { font-size:16px; }
.reader-content a { color:var(--accent3); text-decoration:none; word-break:break-word; }
.reader-content img { max-width:100%; height:auto; border-radius:10px; margin:12px 0; }
.reader-content ul,.reader-content ol { margin:0 0 16px 22px; }
.reader-content li { margin-bottom:7px; }
.reader-content blockquote { border-left:3px solid var(--accent); padding-left:14px; margin:0 0 16px; color:var(--text3); font-style:italic; }
.reader-content hr { border:none; border-top:1px solid var(--border); margin:22px 0; }
.reader-loading { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px; padding:80px 30px; color:var(--text3); }
.reader-spinner { width:34px; height:34px; border:3px solid var(--border); border-top-color:var(--accent3); border-radius:50%; animation:spin 0.8s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
.reader-error { padding:60px 30px; text-align:center; color:var(--text2); }
.reader-error p { font-size:14px; line-height:1.7; margin-bottom:18px; }
.reader-error-btn { display:inline-block; font-size:14px; font-weight:800; color:white; background:linear-gradient(135deg,var(--accent),var(--accent2)); padding:11px 22px; border-radius:11px; border:none; cursor:pointer; font-family:'Inter',sans-serif; }

/* AUDIO SEEK BAR */
.audio-bar { display:flex; align-items:center; gap:10px; padding:9px 16px; border-bottom:1px solid var(--border); flex-shrink:0; background:rgba(124,108,255,0.05); }
.audio-skip { background:transparent; border:1px solid var(--border); color:var(--accent); border-radius:8px; width:34px; height:30px; font-size:13px; cursor:pointer; flex-shrink:0; }
.audio-skip:active { background:var(--surface2); }
.audio-seek { flex:1; height:5px; -webkit-appearance:none; appearance:none; background:var(--border); border-radius:3px; outline:none; }
.audio-seek::-webkit-slider-thumb { -webkit-appearance:none; width:16px; height:16px; border-radius:50%; background:var(--accent); cursor:pointer; }
.audio-seek::-moz-range-thumb { width:16px; height:16px; border-radius:50%; background:var(--accent); border:none; cursor:pointer; }
.audio-pos { font-size:11px; color:var(--text3); font-weight:700; min-width:34px; text-align:right; flex-shrink:0; }

/* HIGHLIGHT SELECTION TOOLBAR */
.hl-toolbar { position:fixed; left:50%; transform:translateX(-50%) translateY(10px); bottom:calc(24px + var(--safe-bottom)); z-index:450; opacity:0; pointer-events:none; transition:all 0.18s; }
.hl-toolbar.show { opacity:1; pointer-events:auto; transform:translateX(-50%) translateY(0); }
.hl-toolbar button { background:linear-gradient(135deg,var(--accent),var(--accent2)); color:#fff; border:none; padding:11px 20px; border-radius:12px; font-family:'Inter',sans-serif; font-weight:800; font-size:14px; cursor:pointer; box-shadow:0 6px 24px rgba(124,108,255,0.45); }

/* mark saved highlights inline */
.reader-content .hl-mark { background:rgba(255,224,102,0.25); border-bottom:2px solid #ffe066; border-radius:2px; }

/* HIGHLIGHTS BUTTON + VIEW */
.hl-open-btn { font-size:11px; font-weight:800; color:var(--accent3); border:1px solid rgba(108,255,184,0.3); background:rgba(108,255,184,0.06); padding:6px 11px; border-radius:9px; cursor:pointer; font-family:'Inter',sans-serif; white-space:nowrap; }
.note-group { margin-bottom:22px; }
.note-group-title { font-size:13px; font-weight:800; color:var(--text); margin-bottom:4px; line-height:1.3; }
.note-group-src { font-size:11px; color:var(--accent3); font-weight:600; margin-bottom:10px; cursor:pointer; }
.note-card { background:var(--surface); border:1px solid var(--border); border-left:3px solid #ffe066; border-radius:10px; padding:12px 14px; margin-bottom:8px; position:relative; }
.note-quote { font-size:14px; line-height:1.6; color:var(--text); }
.note-meta { font-size:10px; color:var(--text3); font-weight:600; margin-top:8px; display:flex; justify-content:space-between; align-items:center; }
.note-del { color:var(--text3); cursor:pointer; font-size:12px; padding:2px 6px; }
.note-del:active { color:#ff3355; }
</style>
</head>
<body>

<div class="header">
  <div class="logo"><span class="logo-sb">SB's </span><span class="logo-x">Reads</span><span style="font-size:9px;color:var(--text3);font-weight:600;margin-left:6px">v9</span></div>
  <div style="display:flex;align-items:center;gap:8px">
    <button class="hl-open-btn" onclick="openNotes()">★ Highlights</button>
    <span class="count" id="count">0 links</span>
  </div>
</div>

<div class="add-wrap">
  <div class="add-row">
    <input class="add-input" id="urlInput" placeholder="paste an article link..." inputmode="url" onkeydown="if(event.key==='Enter')addLink()">
    <button class="btn-paste" onclick="pasteFromClipboard()" title="Paste from clipboard">📋</button>
    <button class="btn-add" onclick="addLink()">Save</button>
  </div>
  <div class="hint">Paste a link and tap Save, or share a link to <b>SB's Reads</b> from any app. Tap a saved link to read it in-app · swipe left to delete.</div>
</div>

<div class="search-wrap">
  <span class="search-icon">⌕</span>
  <input class="search-input" id="searchInput" placeholder="search saved links..." oninput="render()">
</div>

<div class="cat-filters" id="catFilters"></div>

<div class="list-wrap" id="list"></div>

<div class="toast" id="toast"></div>

<!-- READER -->
<div class="reader" id="reader">
  <div class="reader-header">
    <div class="reader-back" onclick="closeReader()">‹ Back</div>
    <div class="reader-domain" id="readerDomain"></div>
    <button class="reader-orig" id="readerOrig">Original ↗</button>
  </div>
  <div class="reader-toggle">
    <button class="rt-btn active" id="rtFull" onclick="showFull()">📄 Full</button>
    <button class="rt-btn" id="rtSummary" onclick="showSummary()">✦ Summary</button>
    <button class="rt-btn rt-listen" id="rtListen" onclick="toggleListen()">▶ Listen</button>
    <button class="rt-btn rt-speed" id="rtSpeed" onclick="cycleSpeed()">1×</button>
  </div>
  <div class="audio-bar" id="audioBar" style="display:none">
    <button class="audio-skip" onclick="skipChunk(-1)">⏮</button>
    <input type="range" class="audio-seek" id="audioSeek" min="0" max="100" value="0" oninput="seekTo(this.value)">
    <button class="audio-skip" onclick="skipChunk(1)">⏭</button>
    <span class="audio-pos" id="audioPos">0%</span>
  </div>
  <div class="reader-body" id="readerBody"></div>
  <div class="hl-toolbar" id="hlToolbar"><button onmousedown="grabSelection(event)" ontouchstart="grabSelection(event)" onclick="saveHighlight()">★ Save highlight</button></div>
</div>

<!-- HIGHLIGHTS VIEW -->
<div class="reader" id="notesPage">
  <div class="reader-header">
    <div class="reader-back" onclick="closeNotes()">‹ Back</div>
    <div class="reader-domain">My Highlights</div>
    <span class="count" id="notesCount">0</span>
  </div>
  <div class="reader-body" id="notesBody"></div>
</div>

<script>
const KEY = 'sbr_links';
const WORKER = 'https://sbs-reads-worker.steveblekaitis.workers.dev';
const CATS = [
  { name:'World News',      color:'#54a0ff' },
  { name:'Pol & Govt',      color:'#ff6b6b' },
  { name:'Biz & Econ',      color:'#ffaa44' },
  { name:'Finance',         color:'#ffd166' },
  { name:'Tech & Science',  color:'#7c6cff' },
  { name:'Health',          color:'#6cffb8' },
  { name:'Travel',          color:'#4ecdc4' },
  { name:'Food & Drink',    color:'#ff9ff3' },
  { name:'Local / Toronto', color:'#06d6a0' },
  { name:'Other',           color:'#a8a8c0' },
];
function catColor(name){ return (CATS.find(c=>c.name===name)||{}).color || '#a8a8c0'; }
let activeCat = null;
let links = [];

function load() {
  try { links = JSON.parse(localStorage.getItem(KEY) || '[]'); }
  catch(e) { links = []; }
}
function save() {
  try { localStorage.setItem(KEY, JSON.stringify(links)); }
  catch(e) { /* storage blocked (e.g. preview sandbox) — links still live in memory this session */ }
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function normalizeUrl(raw) {
  let u = (raw||'').trim();
  if (!u) return null;
  const match = u.match(/https?:\/\/[^\s]+/i);
  if (match) u = match[0];
  if (!/^https?:\/\//i.test(u)) u = 'https://' + u;
  try { new URL(u); return u; } catch(e) { return null; }
}

function domainOf(url) {
  try { return new URL(url).hostname.replace(/^www\./,''); }
  catch(e) { return url; }
}

function faviconOf(url) {
  return 'https://www.google.com/s2/favicons?domain=' + encodeURIComponent(domainOf(url)) + '&sz=64';
}

function timeAgo(ts) {
  const s = Math.floor((Date.now() - ts) / 1000);
  if (s < 60) return 'just now';
  const m = Math.floor(s/60); if (m < 60) return m + 'm ago';
  const h = Math.floor(m/60); if (h < 24) return h + 'h ago';
  const d = Math.floor(h/24); if (d < 7) return d + 'd ago';
  return new Date(ts).toLocaleDateString('en-US',{month:'short',day:'numeric'});
}

// Core save used by manual add AND shared links
function saveLink(rawUrl, title) {
  const url = normalizeUrl(rawUrl);
  if (!url) return { ok:false, reason:'invalid' };
  if (links.some(l => l.url === url)) return { ok:false, reason:'dupe' };
  const link = { id: Date.now(), url, domain: domainOf(url), title: (title||'').trim() || null, cat: null, addedAt: Date.now() };
  links.unshift(link);
  save();
  return { ok:true, link };
}

// Ask the Worker to assign a category. text optional (Worker quick-fetches if absent).
async function categorizeLink(link, text) {
  try {
    const resp = await fetch(WORKER + '/categorize', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url: link.url, title: link.title || '', text: text || '' }),
    });
    const data = await resp.json();
    if (data.ok && data.category) {
      const l = links.find(x => x.id === link.id);
      if (l) { l.cat = data.category; save(); buildCatFilters(); render(); }
    }
  } catch(e) { /* leave untagged; will retry when read */ }
}

function addLink() {
  const input = document.getElementById('urlInput');
  const res = saveLink(input.value);
  if (!res.ok && res.reason === 'invalid') { showToast("That doesn't look like a link"); return; }
  if (!res.ok && res.reason === 'dupe') { showToast('Already saved'); input.value=''; return; }
  input.value = '';
  render();
  showToast('Saved ✓ · tagging…');
  categorizeLink(res.link);
}

async function pasteFromClipboard() {
  try {
    const text = await navigator.clipboard.readText();
    if (!text) { showToast('Clipboard is empty'); return; }
    document.getElementById('urlInput').value = text.trim();
    addLink();
  } catch(e) {
    showToast('Tap the box and paste manually');
    document.getElementById('urlInput').focus();
  }
}

function deleteLink(id) {
  const idx = links.findIndex(l => l.id === id);
  if (idx === -1) return;
  const removed = links[idx];
  links.splice(idx, 1);
  save();
  render();
  showUndoToast(removed, idx);
}

function buildCatFilters() {
  const el = document.getElementById('catFilters');
  if (!el) return;
  // only show categories that actually have links, plus All
  const present = new Set(links.map(l => l.cat).filter(Boolean));
  let html = `<button class="cat-pill ${activeCat===null?'all-active':''}" onclick="setCat(null)">All</button>`;
  CATS.forEach(c => {
    if (!present.has(c.name)) return;
    const on = activeCat === c.name;
    html += `<button class="cat-pill ${on?'active':''}" style="${on?`background:${c.color};border-color:transparent`:''}" onclick="setCat('${c.name.replace(/'/g,"\\'")}')">${esc(c.name)}</button>`;
  });
  el.innerHTML = html;
}

function setCat(name) {
  activeCat = (activeCat === name) ? null : name;
  buildCatFilters();
  render();
}

function render() {
  const list = document.getElementById('list');
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  let filtered = links.filter(l => {
    if (activeCat && l.cat !== activeCat) return false;
    if (q && !(l.url.toLowerCase().includes(q) || l.domain.toLowerCase().includes(q) || (l.title||'').toLowerCase().includes(q))) return false;
    return true;
  });
  document.getElementById('count').textContent = links.length + ' link' + (links.length!==1?'s':'');
  if (!filtered.length) {
    list.innerHTML = `<div class="empty"><div class="icon">${q||activeCat?'⌕':'🔖'}</div><p>${q||activeCat?'No links match.':'No saved links yet.<br>Paste a link above, or share one into the app.'}</p></div>`;
    return;
  }
  list.innerHTML = filtered.map(l => {
    const tag = l.cat
      ? `<span class="cat-tag" style="background:${catColor(l.cat)};color:#0d0d15">${esc(l.cat)}</span>`
      : `<span class="cat-tag pending">…</span>`;
    return `
    <div class="link-item" data-id="${l.id}" onclick="openLink(${l.id})">
      <div class="fav"><img src="${esc(faviconOf(l.url))}" onerror="this.style.display='none';this.parentNode.innerHTML='<span class=&quot;fav-fallback&quot;>🔗</span>'"></div>
      <div class="link-body">
        <div class="link-title">${esc(l.title || l.domain)}</div>
        <div class="task-meta" style="display:flex;gap:7px;align-items:center;margin-top:4px">${tag}<span class="link-url" style="margin-top:0">${esc(l.domain)}</span></div>
      </div>
      <span class="link-time">${timeAgo(l.addedAt)}</span>
    </div>`;
  }).join('');
}

function openLink(id) {
  const l = links.find(l => l.id === id);
  if (l) openReader(l);
}

// ---- IN-APP READER --------------------------------------------------------
let currentReaderUrl = null;
let currentReaderLink = null;
let readerState = { title:'', fullText:'', fullHtml:'', summaryHtml:'', summaryMd:'', summaryLoaded:false, view:'full' };

// highlights persisted separately from links
const HL_KEY = 'sbr_highlights';
let highlights = [];
function loadHighlights(){ try { highlights = JSON.parse(localStorage.getItem(HL_KEY)||'[]'); } catch(e){ highlights=[]; } }
function saveHighlights(){ try { localStorage.setItem(HL_KEY, JSON.stringify(highlights)); } catch(e){} }

function openReader(l) {
  currentReaderUrl = l.url;
  currentReaderLink = l;
  readerState = { title:'', fullText:'', fullHtml:'', summaryHtml:'', summaryMd:'', summaryLoaded:false, view:'full' };
  document.getElementById('readerDomain').textContent = l.domain;
  document.getElementById('readerOrig').onclick = () => window.open(l.url, '_blank', 'noopener');
  setToggle('full');
  document.getElementById('readerBody').innerHTML =
    '<div class="reader-loading"><div class="reader-spinner"></div><div>Fetching article…</div></div>';
  document.getElementById('reader').classList.add('open');
  fetchArticle(l);
}

function closeReader() {
  stopSpeech();
  document.getElementById('reader').classList.remove('open');
}

// ---- TEXT-TO-SPEECH (free, phone's built-in voice) ------------------------
let speaking = false;
let speechChunks = [];
let speechIdx = 0;
const SPEEDS = [1, 1.25, 1.5, 1.75, 2];
let speechRate = parseFloat(localStorage.getItem('sbr_rate') || '1') || 1;

function cycleSpeed() {
  let i = SPEEDS.indexOf(speechRate);
  i = (i + 1) % SPEEDS.length;
  speechRate = SPEEDS[i];
  localStorage.setItem('sbr_rate', String(speechRate));
  const btn = document.getElementById('rtSpeed');
  if (btn) btn.textContent = (speechRate === 1 ? '1' : speechRate) + '×';
  // if currently playing, restart current chunk at new speed for immediate effect
  if (speaking) {
    try { window.speechSynthesis.cancel(); } catch(e) {}
    speakNext();
  }
}

function plainTextForSpeech() {
  // read whichever view is active; strip markdown so it isn't spoken literally
  const src = readerState.view === 'summary' ? (readerState.summaryMd || '') : (readerState.fullText || '');
  const title = readerState.title ? readerState.title + '. ' : '';
  let t = src
    .replace(/^#{1,6}\s+/gm, '')        // headings
    .replace(/^[->*]\s+/gm, '')          // bullets / quotes
    .replace(/\*\*([^*]+)\*\*/g, '$1')   // bold
    .replace(/\*([^*]+)\*/g, '$1')       // italic
    .replace(/\[([^\]]+)\]\([^)]+\)/g, '$1') // links -> text
    .replace(/!\[[^\]]*\]\([^)]+\)/g, '')    // images
    .replace(/`+/g, '')
    .replace(/\n{2,}/g, '. ')
    .replace(/\s+/g, ' ')
    .trim();
  return title + t;
}

function splitForSpeech(text) {
  // break into sentence-ish chunks; some engines choke on very long strings
  const parts = text.match(/[^.!?]+[.!?]+|\S[^.!?]*$/g) || [text];
  const chunks = [];
  let buf = '';
  for (const p of parts) {
    if ((buf + p).length > 220) { if (buf) chunks.push(buf.trim()); buf = p; }
    else buf += p;
  }
  if (buf.trim()) chunks.push(buf.trim());
  return chunks;
}

let paused = false;

function toggleListen() {
  if (!('speechSynthesis' in window)) { showToast('Voice not supported on this browser'); return; }
  // resume from pause
  if (speaking && paused) {
    paused = false;
    setListenBtn(true);
    speakNext();
    return;
  }
  // pause while playing
  if (speaking && !paused) {
    paused = true;
    setListenBtn(false);
    try { window.speechSynthesis.cancel(); } catch(e) {}
    return;
  }
  // fresh start
  const text = plainTextForSpeech();
  if (!text || text.length < 4) { showToast('Nothing to read yet'); return; }
  speechChunks = splitForSpeech(text);
  speechIdx = 0;
  speaking = true;
  paused = false;
  setListenBtn(true);
  document.getElementById('audioBar').style.display = 'flex';
  updateSeek();
  speakNext();
}

function setListenBtn(playing) {
  const btn = document.getElementById('rtListen');
  if (!btn) return;
  if (playing) { btn.classList.add('playing'); btn.innerHTML = '⏸ Pause'; }
  else { btn.classList.remove('playing'); btn.innerHTML = '▶ Play'; }
}

function speakNext() {
  if (!speaking || paused) return;
  if (speechIdx >= speechChunks.length) { endPlayback(); return; }
  updateSeek();
  const u = new SpeechSynthesisUtterance(speechChunks[speechIdx]);
  u.rate = speechRate; u.pitch = 1.0; u.lang = 'en-US';
  u.onend = () => { if (speaking && !paused) { speechIdx++; speakNext(); } };
  u.onerror = () => { if (speaking && !paused) { speechIdx++; speakNext(); } };
  window.speechSynthesis.speak(u);
}

function updateSeek() {
  const total = speechChunks.length || 1;
  const pct = Math.round((speechIdx / total) * 100);
  const seek = document.getElementById('audioSeek');
  const pos = document.getElementById('audioPos');
  if (seek) seek.value = pct;
  if (pos) pos.textContent = pct + '%';
}

function skipChunk(dir) {
  if (!speaking) return;
  speechIdx = Math.max(0, Math.min((speechChunks.length||1) - 1, speechIdx + dir));
  try { window.speechSynthesis.cancel(); } catch(e) {}
  paused = false; setListenBtn(true);
  speakNext();
}

function seekTo(val) {
  if (!speaking || !speechChunks.length) return;
  speechIdx = Math.floor((val / 100) * speechChunks.length);
  if (speechIdx >= speechChunks.length) speechIdx = speechChunks.length - 1;
  if (speechIdx < 0) speechIdx = 0;
  try { window.speechSynthesis.cancel(); } catch(e) {}
  paused = false; setListenBtn(true);
  speakNext();
}

// playback reached the end naturally — reset but keep bar so they can replay
function endPlayback() {
  speaking = false; paused = false;
  setListenBtn(false);
  speechIdx = 0;
  updateSeek();
}

// full teardown (leaving the reader)
function stopSpeech() {
  speaking = false; paused = false;
  try { window.speechSynthesis.cancel(); } catch(e) {}
  setListenBtn(false);
  const bar = document.getElementById('audioBar');
  if (bar) bar.style.display = 'none';
}

// ---- HIGHLIGHTS -----------------------------------------------------------
function checkSelection() {
  const sel = window.getSelection();
  const text = sel ? sel.toString().trim() : '';
  const tb = document.getElementById('hlToolbar');
  if (!tb) return;
  const readerOpen = document.getElementById('reader').classList.contains('open');
  // selection must be inside the reader body
  let inBody = false;
  if (sel && sel.rangeCount && readerOpen) {
    let node = sel.anchorNode;
    while (node) {
      if (node.id === 'readerBody') { inBody = true; break; }
      node = node.parentNode;
    }
  }
  if (inBody && text.length > 3) tb.classList.add('show');
  else tb.classList.remove('show');
}
// fire after the user finishes selecting (works on touch + mouse)
document.addEventListener('touchend', () => setTimeout(checkSelection, 60), {passive:true});
document.addEventListener('mouseup', () => setTimeout(checkSelection, 10));

let pendingHighlight = '';
function grabSelection(e) {
  // capture the selected text the instant the button is pressed,
  // before the tap collapses the selection
  const sel = window.getSelection();
  pendingHighlight = sel ? sel.toString().trim() : '';
  if (e) e.preventDefault();
}

function saveHighlight() {
  const text = pendingHighlight || (window.getSelection() ? window.getSelection().toString().trim() : '');
  if (!text || !currentReaderLink) { document.getElementById('hlToolbar').classList.remove('show'); return; }
  highlights.unshift({
    id: Date.now(),
    text,
    url: currentReaderLink.url,
    title: readerState.title || currentReaderLink.title || currentReaderLink.domain,
    domain: currentReaderLink.domain,
    addedAt: Date.now(),
  });
  saveHighlights();
  pendingHighlight = '';
  document.getElementById('hlToolbar').classList.remove('show');
  try { window.getSelection().removeAllRanges(); } catch(e){}
  showToast('★ Highlight saved');
}

function openNotes() {
  renderNotes();
  document.getElementById('notesPage').classList.add('open');
}
function closeNotes() {
  document.getElementById('notesPage').classList.remove('open');
}

function renderNotes() {
  const body = document.getElementById('notesBody');
  document.getElementById('notesCount').textContent = highlights.length;
  if (!highlights.length) {
    body.innerHTML = '<div class="reader-error"><p>No highlights yet.<br>While reading an article, select any text and tap ★ Save highlight.</p></div>';
    return;
  }
  // group by article
  const groups = {};
  highlights.forEach(h => { (groups[h.url] = groups[h.url] || []).push(h); });
  let html = '';
  Object.keys(groups).forEach(url => {
    const g = groups[url];
    html += `<div class="note-group">
      <div class="note-group-title">${esc(g[0].title || g[0].domain)}</div>
      <div class="note-group-src" onclick="window.open('${esc(url)}','_blank','noopener')">${esc(g[0].domain)} ↗</div>`;
    g.forEach(h => {
      html += `<div class="note-card">
        <div class="note-quote">${esc(h.text)}</div>
        <div class="note-meta"><span>${new Date(h.addedAt).toLocaleDateString('en-US',{month:'short',day:'numeric'})}</span><span class="note-del" onclick="deleteHighlight(${h.id})">🗑 remove</span></div>
      </div>`;
    });
    html += `</div>`;
  });
  body.innerHTML = html;
}

function deleteHighlight(id) {
  highlights = highlights.filter(h => h.id !== id);
  saveHighlights();
  renderNotes();
}

function setToggle(view) {
  document.getElementById('rtFull').classList.toggle('active', view==='full');
  document.getElementById('rtSummary').classList.toggle('active', view==='summary');
}

async function fetchArticle(l) {
  try {
    const resp = await fetch(WORKER + '/article?url=' + encodeURIComponent(l.url));
    const data = await resp.json();
    if (currentReaderUrl !== l.url) return;
    if (!data.ok || !data.text) { showReaderError(l); return; }
    if (data.title && (!l.title || l.title === l.domain)) {
      l.title = decodeEntities(data.title); save(); render();
    }
    readerState.title = decodeEntities(data.title || l.domain);
    readerState.fullText = data.text;
    // self-correct / fill category now that we have real article text
    if (!l.cat || l.cat === 'Other') {
      categorizeLink(l, data.text);
    }
    readerState.fullHtml =
      '<div class="reader-title">' + esc(readerState.title) + '</div>' +
      '<div class="reader-content">' + mdToHtml(data.text) + '</div>';
    if (readerState.view === 'full') {
      document.getElementById('readerBody').innerHTML = readerState.fullHtml;
      document.getElementById('readerBody').scrollTop = 0;
    }
  } catch(e) {
    if (currentReaderUrl === l.url) showReaderError(l);
  }
}

function showFull() {
  stopSpeech();
  readerState.view = 'full';
  setToggle('full');
  const body = document.getElementById('readerBody');
  if (readerState.fullHtml) { body.innerHTML = readerState.fullHtml; body.scrollTop = 0; }
  else body.innerHTML = '<div class="reader-loading"><div class="reader-spinner"></div><div>Fetching article…</div></div>';
}

async function showSummary() {
  stopSpeech();
  readerState.view = 'summary';
  setToggle('summary');
  const body = document.getElementById('readerBody');

  if (readerState.summaryLoaded) { body.innerHTML = readerState.summaryHtml; body.scrollTop = 0; return; }
  if (!readerState.fullText) {
    body.innerHTML = '<div class="reader-error"><p>Need the article text first. Try Full, then Summary.</p></div>';
    return;
  }
  body.innerHTML = '<div class="reader-loading"><div class="reader-spinner"></div><div>Summarizing…</div></div>';
  const urlAtRequest = currentReaderUrl;
  try {
    const resp = await fetch(WORKER + '/summarize', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text: readerState.fullText, title: readerState.title }),
    });
    const data = await resp.json();
    if (currentReaderUrl !== urlAtRequest || readerState.view !== 'summary') return;
    if (!data.ok || !data.summary) {
      body.innerHTML = '<div class="reader-error"><p>Couldn\'t generate a summary' +
        (data.error ? ' (' + esc(data.error) + ')' : '') + '.</p>' +
        '<button class="reader-error-btn" onclick="showFull()">Back to full article</button></div>';
      return;
    }
    readerState.summaryMd = data.summary;
    readerState.summaryHtml =
      '<div class="reader-title">' + esc(readerState.title) + '</div>' +
      '<div class="summary-meta">✦ AI summary · always verify against the full article</div>' +
      '<div class="reader-content">' + mdToHtml(data.summary) + '</div>';
    readerState.summaryLoaded = true;
    body.innerHTML = readerState.summaryHtml;
    body.scrollTop = 0;
  } catch(e) {
    if (currentReaderUrl === urlAtRequest && readerState.view === 'summary') {
      body.innerHTML = '<div class="reader-error"><p>Summary failed — network issue.</p>' +
        '<button class="reader-error-btn" onclick="showSummary()">Try again</button></div>';
    }
  }
}

function showReaderError(l) {
  document.getElementById('readerBody').innerHTML =
    '<div class="reader-error"><p>Couldn\'t pull a clean reading version of this one.<br>' +
    'It may be paywalled, login-only, or block readers.</p>' +
    '<button class="reader-error-btn" onclick="window.open(\'' + esc(l.url) + '\',\'_blank\',\'noopener\')">Open original ↗</button></div>';
}

// Decode HTML entities (the Worker passes through what the page contained).
function decodeEntities(s) {
  if (!s) return '';
  return String(s)
    .replace(/&#(\d+);/g, (_, n) => String.fromCharCode(parseInt(n, 10)))
    .replace(/&#x([0-9a-fA-F]+);/g, (_, n) => String.fromCharCode(parseInt(n, 16)))
    .replace(/&quot;/g, '"').replace(/&#39;/g, "'").replace(/&apos;/g, "'")
    .replace(/&nbsp;/g, ' ').replace(/&mdash;/g, '\u2014').replace(/&ndash;/g, '\u2013')
    .replace(/&lsquo;/g, '\u2018').replace(/&rsquo;/g, '\u2019')
    .replace(/&ldquo;/g, '\u201C').replace(/&rdquo;/g, '\u201D')
    .replace(/&hellip;/g, '\u2026').replace(/&amp;/g, '&'); // amp last
}

// Markdown -> HTML for article bodies. Processes line-by-line so headings
// and short standalone lines (e.g. a one-letter grade) never get swallowed.
function mdToHtml(md) {
  const decoded = decodeEntities(md);
  const lines = decoded.split('\n');
  const out = [];
  let para = [];       // buffer for consecutive plain-text lines
  let listItems = [];  // buffer for consecutive bullet lines

  const inline = (s) => {
    // escape, then re-introduce links / bold / italic safely
    let x = esc(s);
    x = x.replace(/\[([^\]]+)\]\((https?:[^)\s]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
    x = x.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
    x = x.replace(/(^|[^*])\*([^*]+)\*/g, '$1<em>$2</em>');
    return x;
  };
  const flushPara = () => {
    if (para.length) { out.push('<p>' + para.map(inline).join('<br>') + '</p>'); para = []; }
  };
  const flushList = () => {
    if (listItems.length) { out.push('<ul>' + listItems.map(li => '<li>' + inline(li) + '</li>').join('') + '</ul>'); listItems = []; }
  };

  for (let raw of lines) {
    const line = raw.trim();
    if (!line) { flushPara(); flushList(); continue; }

    let m;
    if ((m = line.match(/^###\s+(.+)$/))) { flushPara(); flushList(); out.push('<h3>' + inline(m[1]) + '</h3>'); continue; }
    if ((m = line.match(/^##\s+(.+)$/)))  { flushPara(); flushList(); out.push('<h2>' + inline(m[1]) + '</h2>'); continue; }
    if ((m = line.match(/^#\s+(.+)$/)))   { flushPara(); flushList(); out.push('<h1>' + inline(m[1]) + '</h1>'); continue; }
    if ((m = line.match(/^[-*]\s+(.+)$/))){ flushPara(); listItems.push(m[1]); continue; }
    if ((m = line.match(/^>\s?(.+)$/)))   { flushPara(); flushList(); out.push('<blockquote>' + inline(m[1]) + '</blockquote>'); continue; }
    if (/^[-*_]{3,}$/.test(line))         { flushPara(); flushList(); out.push('<hr>'); continue; }
    if (/^!\[([^\]]*)\]\((https?:[^)\s]+)\)$/.test(line)) {
      flushPara(); flushList();
      out.push(line.replace(/^!\[([^\]]*)\]\((https?:[^)\s]+)\)$/, '<img alt="$1" src="$2">'));
      continue;
    }
    // plain text line
    flushList();
    para.push(line);
  }
  flushPara(); flushList();
  return out.join('\n');
}

// Handle a link shared into the app via Android share sheet
function handleSharedLink() {
  const p = new URLSearchParams(location.search);
  const shared = p.get('url') || p.get('text') || '';
  const title = p.get('title') || '';
  // clean the address bar regardless, so refresh won't re-add
  if (location.search) history.replaceState({}, '', location.pathname);
  if (!shared) return;
  const res = saveLink(shared, title);
  render();
  if (res.ok) { showToast('Shared link saved ✓'); categorizeLink(res.link); }
  else if (res.reason === 'dupe') showToast('Already in your list');
  else showToast('Could not read that shared link');
}

/* SWIPE TO DELETE */
function setupSwipe() {
  let row = null, bg = null, startX = 0, startY = 0, moved = false;
  const T = 90;
  const list = document.getElementById('list');

  list.addEventListener('touchstart', e => {
    const r = e.target.closest('.link-item[data-id]');
    if (!r) { row = null; return; }
    row = r; startX = e.touches[0].clientX; startY = e.touches[0].clientY; moved = false;
    row.style.transition = 'none';
    row.querySelectorAll('.swipe-bg').forEach(el=>el.remove());
    bg = document.createElement('div');
    bg.className = 'swipe-bg';
    bg.style.cssText = 'position:absolute;inset:0;background:#ff3355;display:flex;align-items:center;justify-content:flex-end;padding-right:20px;z-index:0;opacity:0;pointer-events:none';
    bg.innerHTML = '<span style="font-size:13px;font-weight:800;color:white">🗑 DELETE</span>';
    row.appendChild(bg);
  }, {passive:true});

  list.addEventListener('touchmove', e => {
    if (!row) return;
    const dx = e.touches[0].clientX - startX;
    const dy = e.touches[0].clientY - startY;
    if (!moved && Math.abs(dy) > Math.abs(dx) + 5) { if(bg){bg.remove();bg=null;} row=null; return; }
    if (dx < 0) { moved = true; row.style.transform = `translateX(${Math.max(dx,-200)}px)`; if(bg) bg.style.opacity = Math.min(Math.abs(dx)/T,1); }
  }, {passive:true});

  list.addEventListener('touchend', e => {
    if (!row) return;
    const dx = e.changedTouches[0].clientX - startX;
    if (moved && Math.abs(dx) > T) {
      const id = parseInt(row.dataset.id);
      if (bg) { bg.remove(); bg = null; }
      deleteLink(id);
    } else {
      row.style.transition = 'transform 0.25s cubic-bezier(0.4,0,0.2,1)';
      row.style.transform = 'translateX(0)';
      if (bg) { bg.style.transition='opacity 0.2s'; bg.style.opacity='0'; const b=bg; setTimeout(()=>b.remove(),220); bg=null; }
    }
    row = null; moved = false;
  }, {passive:true});
}

function showToast(msg, ms=2000) {
  const t = document.getElementById('toast');
  t.innerHTML = esc(msg);
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(()=>t.classList.remove('show'), ms);
}

function showUndoToast(removed, idx) {
  const t = document.getElementById('toast');
  t.innerHTML = '<span>Deleted</span>';
  const btn = document.createElement('button');
  btn.className = 'toast-undo';
  btn.textContent = '↩ Undo';
  btn.onclick = () => {
    links.splice(Math.min(idx, links.length), 0, removed);
    save(); render();
    t.classList.remove('show');
    clearTimeout(t._timer);
  };
  t.appendChild(btn);
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(()=>t.classList.remove('show'), 5000);
}
