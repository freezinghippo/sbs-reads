<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0d0d15">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SB's Reads">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>SB's Reads</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0d0d15; --surface:#161622; --surface2:#1c1c2e; --border:#2a2a3d;
  --accent:#7c6cff; --accent2:#ff6c9d; --accent3:#6cffb8;
  --text:#f0f0ff; --text2:#b0b0cc; --text3:#7a7a99;
  --safe-top:env(safe-area-inset-top,0px); --safe-bottom:env(safe-area-inset-bottom,0px);
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { font-family:'Inter',sans-serif; background:var(--bg); color:var(--text); height:100dvh; display:flex; flex-direction:column; overflow:hidden; padding-top:var(--safe-top); }

.header { padding:14px 18px 12px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid var(--border); flex-shrink:0; }
.logo { font-size:21px; font-weight:900; letter-spacing:-0.5px; }
.logo-sb { color:var(--text); }
.logo-x { color:var(--accent3); }
.count { font-size:11px; color:var(--text3); background:var(--surface); padding:4px 11px; border-radius:20px; border:1px solid var(--border); font-weight:600; }

.add-wrap { padding:14px 18px 10px; flex-shrink:0; }
.add-row { display:flex; gap:8px; }
.add-input { flex:1; background:var(--surface); border:1.5px solid var(--border); border-radius:12px; padding:12px 14px; color:var(--text); font-family:'Inter',sans-serif; font-size:14px; font-weight:500; outline:none; transition:border-color 0.15s; min-width:0; }
.add-input::placeholder { color:var(--text3); }
.add-input:focus { border-color:var(--accent); }
.btn-paste { width:46px; flex-shrink:0; border-radius:12px; border:1.5px solid var(--accent2); background:transparent; color:var(--accent2); font-size:17px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.15s; }
.btn-paste:active { background:rgba(255,108,157,0.12); }
.btn-add { flex-shrink:0; padding:0 18px; border-radius:12px; border:none; background:linear-gradient(135deg,var(--accent),var(--accent2)); color:white; font-family:'Inter',sans-serif; font-weight:800; font-size:14px; cursor:pointer; transition:all 0.15s; }
.btn-add:active { transform:scale(0.96); }
.hint { font-size:11px; color:var(--text3); margin-top:8px; font-weight:500; line-height:1.5; }

.search-wrap { padding:0 18px 8px; flex-shrink:0; position:relative; }
.search-icon { position:absolute; left:30px; top:50%; transform:translateY(-50%); color:var(--text3); font-size:13px; pointer-events:none; }
.search-input { width:100%; background:var(--surface); border:1.5px solid var(--border); border-radius:11px; padding:8px 14px 8px 32px; color:var(--text); font-family:'Inter',sans-serif; font-size:13px; font-weight:500; outline:none; transition:border-color 0.15s; }
.search-input::placeholder { color:var(--text3); }
.search-input:focus { border-color:var(--accent); }

.list-wrap { flex:1; overflow-y:auto; overflow-x:hidden; padding-bottom:30px; scrollbar-width:none; min-height:0; }
.list-wrap::-webkit-scrollbar { display:none; }

.link-item { display:flex; align-items:center; padding:13px 18px; border-bottom:1px solid var(--border); gap:13px; cursor:pointer; background:var(--bg); position:relative; overflow:hidden; }
.link-item:active { background:var(--surface); }
.fav { width:34px; height:34px; border-radius:9px; background:var(--surface2); flex-shrink:0; display:flex; align-items:center; justify-content:center; overflow:hidden; border:1px solid var(--border); }
.fav img { width:20px; height:20px; }
.fav-fallback { font-size:15px; color:var(--text3); }
.link-body { flex:1; min-width:0; }
.link-title { font-size:14px; color:var(--text); font-weight:700; line-height:1.35; word-break:break-word; }
.link-url { font-size:11px; color:var(--text3); font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:2px; }
.link-time { font-size:10px; color:var(--text3); font-weight:600; flex-shrink:0; white-space:nowrap; align-self:flex-start; padding-top:2px; }

.empty { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px; padding:70px 30px; color:var(--text3); }
.empty .icon { font-size:40px; opacity:0.6; }
.empty p { font-size:13px; text-align:center; line-height:1.7; color:var(--text2); }

.toast { position:fixed; bottom:calc(24px + var(--safe-bottom)); left:50%; transform:translateX(-50%) translateY(20px); background:var(--surface2); border:1px solid var(--border); color:var(--text); padding:10px 18px; border-radius:12px; font-size:13px; font-weight:600; opacity:0; transition:all 0.3s; z-index:9999; white-space:nowrap; pointer-events:none; display:flex; align-items:center; gap:12px; }
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); pointer-events:auto; }
.toast-undo { background:var(--accent); color:white; border:none; padding:6px 14px; border-radius:8px; font-weight:800; font-size:12px; cursor:pointer; font-family:'Inter',sans-serif; }

@keyframes slideIn { from{opacity:0;transform:translateX(-8px)} to{opacity:1;transform:translateX(0)} }
.link-item { animation:slideIn 0.18s ease; }
</style>
</head>
<body>

<div class="header">
  <div class="logo"><span class="logo-sb">SB's </span><span class="logo-x">Reads</span><span style="font-size:9px;color:var(--text3);font-weight:600;margin-left:6px">v2</span></div>
  <span class="count" id="count">0 links</span>
</div>

<div class="add-wrap">
  <div class="add-row">
    <input class="add-input" id="urlInput" placeholder="paste an article link..." inputmode="url" onkeydown="if(event.key==='Enter')addLink()">
    <button class="btn-paste" onclick="pasteFromClipboard()" title="Paste from clipboard">📋</button>
    <button class="btn-add" onclick="addLink()">Save</button>
  </div>
  <div class="hint">Paste a link and tap Save, or share a link to <b>SB's Reads</b> from any app. Tap a saved link to open it · swipe left to delete.</div>
</div>

<div class="search-wrap">
  <span class="search-icon">⌕</span>
  <input class="search-input" id="searchInput" placeholder="search saved links..." oninput="render()">
</div>

<div class="list-wrap" id="list"></div>

<div class="toast" id="toast"></div>

<script>
const KEY = 'sbr_links';
let links = [];

function load() {
  try { links = JSON.parse(localStorage.getItem(KEY) || '[]'); }
  catch(e) { links = []; }
}
function save() { localStorage.setItem(KEY, JSON.stringify(links)); }

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function normalizeUrl(raw) {
  let u = (raw||'').trim();
  if (!u) return null;
  const match = u.match(/https?:\/\/[^\s]+/i);
  if (match) u = match[0];
  if (!/^https?:\/\//i.test(u)) u = 'https://' + u;
  try { new URL(u); return u; } catch(e) { return null; }
}

function domainOf(url) {
  try { return new URL(url).hostname.replace(/^www\./,''); }
  catch(e) { return url; }
}

function faviconOf(url) {
  return 'https://www.google.com/s2/favicons?domain=' + encodeURIComponent(domainOf(url)) + '&sz=64';
}

function timeAgo(ts) {
  const s = Math.floor((Date.now() - ts) / 1000);
  if (s < 60) return 'just now';
  const m = Math.floor(s/60); if (m < 60) return m + 'm ago';
  const h = Math.floor(m/60); if (h < 24) return h + 'h ago';
  const d = Math.floor(h/24); if (d < 7) return d + 'd ago';
  return new Date(ts).toLocaleDateString('en-US',{month:'short',day:'numeric'});
}

// Core save used by manual add AND shared links
function saveLink(rawUrl, title) {
  const url = normalizeUrl(rawUrl);
  if (!url) return { ok:false, reason:'invalid' };
  if (links.some(l => l.url === url)) return { ok:false, reason:'dupe' };
  links.unshift({ id: Date.now(), url, domain: domainOf(url), title: (title||'').trim() || null, addedAt: Date.now() });
  save();
  return { ok:true };
}

function addLink() {
  const input = document.getElementById('urlInput');
  const res = saveLink(input.value);
  if (!res.ok && res.reason === 'invalid') { showToast("That doesn't look like a link"); return; }
  if (!res.ok && res.reason === 'dupe') { showToast('Already saved'); input.value=''; return; }
  input.value = '';
  render();
  showToast('Saved ✓');
}

async function pasteFromClipboard() {
  try {
    const text = await navigator.clipboard.readText();
    if (!text) { showToast('Clipboard is empty'); return; }
    document.getElementById('urlInput').value = text.trim();
    addLink();
  } catch(e) {
    showToast('Tap the box and paste manually');
    document.getElementById('urlInput').focus();
  }
}

function deleteLink(id) {
  const idx = links.findIndex(l => l.id === id);
  if (idx === -1) return;
  const removed = links[idx];
  links.splice(idx, 1);
  save();
  render();
  showUndoToast(removed, idx);
}

function render() {
  const list = document.getElementById('list');
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  let filtered = links.filter(l =>
    !q || l.url.toLowerCase().includes(q) || l.domain.toLowerCase().includes(q) || (l.title||'').toLowerCase().includes(q)
  );
  document.getElementById('count').textContent = links.length + ' link' + (links.length!==1?'s':'');
  if (!filtered.length) {
    list.innerHTML = `<div class="empty"><div class="icon">${q?'⌕':'🔖'}</div><p>${q?'No links match your search.':'No saved links yet.<br>Paste a link above, or share one into the app.'}</p></div>`;
    return;
  }
  list.innerHTML = filtered.map(l => `
    <div class="link-item" data-id="${l.id}" onclick="openLink(${l.id})">
      <div class="fav"><img src="${esc(faviconOf(l.url))}" onerror="this.style.display='none';this.parentNode.innerHTML='<span class=&quot;fav-fallback&quot;>🔗</span>'"></div>
      <div class="link-body">
        <div class="link-title">${esc(l.title || l.domain)}</div>
        <div class="link-url">${esc(l.url)}</div>
      </div>
      <span class="link-time">${timeAgo(l.addedAt)}</span>
    </div>`).join('');
}

function openLink(id) {
  const l = links.find(l => l.id === id);
  if (l) window.open(l.url, '_blank', 'noopener');
}

// Handle a link shared into the app via Android share sheet
function handleSharedLink() {
  const p = new URLSearchParams(location.search);
  const shared = p.get('url') || p.get('text') || '';
  const title = p.get('title') || '';
  // clean the address bar regardless, so refresh won't re-add
  if (location.search) history.replaceState({}, '', location.pathname);
  if (!shared) return;
  const res = saveLink(shared, title);
  render();
  if (res.ok) showToast('Shared link saved ✓');
  else if (res.reason === 'dupe') showToast('Already in your list');
  else showToast('Could not read that shared link');
}

/* SWIPE TO DELETE */
function setupSwipe() {
  let row = null, bg = null, startX = 0, startY = 0, moved = false;
  const T = 90;
  const list = document.getElementById('list');

  list.addEventListener('touchstart', e => {
    const r = e.target.closest('.link-item[data-id]');
    if (!r) { row = null; return; }
    row = r; startX = e.touches[0].clientX; startY = e.touches[0].clientY; moved = false;
    row.style.transition = 'none';
    row.querySelectorAll('.swipe-bg').forEach(el=>el.remove());
    bg = document.createElement('div');
    bg.className = 'swipe-bg';
    bg.style.cssText = 'position:absolute;inset:0;background:#ff3355;display:flex;align-items:center;justify-content:flex-end;padding-right:20px;z-index:0;opacity:0;pointer-events:none';
    bg.innerHTML = '<span style="font-size:13px;font-weight:800;color:white">🗑 DELETE</span>';
    row.appendChild(bg);
  }, {passive:true});

  list.addEventListener('touchmove', e => {
    if (!row) return;
    const dx = e.touches[0].clientX - startX;
    const dy = e.touches[0].clientY - startY;
    if (!moved && Math.abs(dy) > Math.abs(dx) + 5) { if(bg){bg.remove();bg=null;} row=null; return; }
    if (dx < 0) { moved = true; row.style.transform = `translateX(${Math.max(dx,-200)}px)`; if(bg) bg.style.opacity = Math.min(Math.abs(dx)/T,1); }
  }, {passive:true});

  list.addEventListener('touchend', e => {
    if (!row) return;
    const dx = e.changedTouches[0].clientX - startX;
    if (moved && Math.abs(dx) > T) {
      const id = parseInt(row.dataset.id);
      if (bg) { bg.remove(); bg = null; }
      deleteLink(id);
    } else {
      row.style.transition = 'transform 0.25s cubic-bezier(0.4,0,0.2,1)';
      row.style.transform = 'translateX(0)';
      if (bg) { bg.style.transition='opacity 0.2s'; bg.style.opacity='0'; const b=bg; setTimeout(()=>b.remove(),220); bg=null; }
    }
    row = null; moved = false;
  }, {passive:true});
}

function showToast(msg, ms=2000) {
  const t = document.getElementById('toast');
  t.innerHTML = esc(msg);
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(()=>t.classList.remove('show'), ms);
}

function showUndoToast(removed, idx) {
  const t = document.getElementById('toast');
  t.innerHTML = '<span>Deleted</span>';
  const btn = document.createElement('button');
  btn.className = 'toast-undo';
  btn.textContent = '↩ Undo';
  btn.onclick = () => {
    links.splice(Math.min(idx, links.length), 0, removed);
    save(); render();
    t.classList.remove('show');
    clearTimeout(t._timer);
  };
  t.appendChild(btn);
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(()=>t.classList.remove('show'), 5000);
}

load();
render();
setupSwipe();
handleSharedLink();
</script>
</body>
</html>
